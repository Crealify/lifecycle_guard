<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>lifecycle_guard 🛡️ Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #090c12;
      color: #e6edf3;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 26px; font-weight: 800; }
    .header h1 span { color: #58a6ff; }
    .header p { color: #8b949e; font-size: 13px; margin-top: 4px; }

    .demo-wrapper {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* ─── PHONE ────────────────────────────────── */
    .phone {
      width: 200px;
      height: 420px;
      background: #111720;
      border: 2px solid #30363d;
      border-radius: 34px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7);
    }

    /* status bar */
    .status-bar {
      height: 28px;
      background: #111720;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #484f58;
      font-family: 'JetBrains Mono', monospace;
    }

    /* notification */
    .phone-notification {
      position: absolute;
      top: 28px;
      left: 8px; right: 8px;
      background: #0e1521;
      border: 1.5px solid #1f6feb;
      border-radius: 14px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 50;
      opacity: 0;
      transform: translateY(-80px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 4px 24px rgba(31,111,235,0.4);
    }
    .phone-notification.show {
      opacity: 1;
      transform: translateY(0);
    }
    .phone-notification .ni { font-size: 18px; }
    .phone-notification .nt { line-height: 1.3; }
    .phone-notification .nt b { font-size: 10px; color: #58a6ff; display: block; }
    .phone-notification .nt span { font-size: 9px; color: #8b949e; }

    /* app screen */
    .app-screen {
      position: absolute;
      top: 28px; bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      background: #111720;
      transition: opacity 0.4s;
    }
    .app-icon-wrap {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1a73e8, #58a6ff);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .app-name { font-size: 14px; font-weight: 700; }
    .sync-btn {
      background: #1f6feb;
      color: white;
      border: none;
      padding: 9px 0;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      width: 100%;
    }
    .app-status {
      font-size: 10px;
      color: #8b949e;
    }

    /* ─── KILL STATE ────────────────────────────── */
    .kill-state {
      position: absolute;
      inset: 0;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      border-radius: 34px;
    }
    .kill-state.show { opacity: 1; }

    /* Scene 1 kill: pure black with red cross */
    .kill-state.dead {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .kill-state.dead .k-icon {
      width: 64px; height: 64px;
      background: rgba(248,81,73,0.15);
      border: 2px solid #f85149;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .kill-state.dead .k-title {
      color: #f85149;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .kill-state.dead .k-sub {
      color: #484f58;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .kill-state.dead .k-badge {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 10px;
      color: #f85149;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Scene 2 kill: dim the UI but notification stays */
    .kill-state.guarded {
      background: rgba(0,0,0,0.80);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 40px;
      gap: 8px;
    }
    .kill-state.guarded .g-icon {
      width: 56px; height: 56px;
      background: rgba(63,185,80,0.12);
      border: 2px solid #3fb950;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .kill-state.guarded .g-title {
      color: #3fb950;
      font-size: 14px;
      font-weight: 800;
    }
    .kill-state.guarded .g-sub {
      color: #8b949e;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── TERMINAL ──────────────────────────────── */
    .terminal {
      width: 500px;
      background: #111720;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .t-bar {
      background: #1c2128;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #30363d;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dr { background: #f85149; } .dy { background: #d29922; } .dg { background: #3fb950; }
    .t-title { font-size: 11px; color: #8b949e; margin-left: 6px; font-family: 'JetBrains Mono', monospace; }

    .t-body {
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      line-height: 1.9;
      min-height: 370px;
      max-height: 370px;
      overflow-y: auto;
    }
    .t-body::-webkit-scrollbar { width: 4px; }
    .t-body::-webkit-scrollbar-track { background: transparent; }
    .t-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    .ll { opacity:0; transform:translateX(-6px); transition: all 0.25s ease; display:flex; gap:8px; }
    .ll.s { opacity:1; transform:translateX(0); }
    .cc { color:#58a6ff; }
    .ci { color:#8b949e; }
    .cs { color:#3fb950; }
    .ce { color:#f85149; }
    .cw { color:#d29922; }
    .cg { color:#79c0ff; font-weight:700; }

    /* ─── SCENE CHIP ────────────────────────────── */
    .scene-chip {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      color: #8b949e;
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .scene-chip.show { opacity: 1; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .blink { animation: blink 1.2s infinite; }
  </style>
</head>
<body>

<div class="header">
  <h1>🛡️ <span>lifecycle_guard</span> by Crealify</h1>
  <p>Background tasks survive. Always.</p>
</div>

<div class="demo-wrapper">
  <!-- PHONE -->
  <div class="phone" id="phone">
    <div class="status-bar">9:41 · Pixel 7</div>

    <!-- Notification (Scene 2 only) -->
    <div class="phone-notification" id="notif">
      <div class="ni">🛡️</div>
      <div class="nt">
        <b>Lifecycle Guard Active</b>
        <span>Securing: sync_001</span>
      </div>
    </div>

    <!-- App Screen -->
    <div class="app-screen" id="appScreen">
      <div class="app-icon-wrap">📡</div>
      <div class="app-name">MyApp</div>
      <button class="sync-btn">Start Background Sync</button>
      <div class="app-status" id="appStatus">Idle</div>
    </div>

    <!-- Kill State DEAD (Scene 1) -->
    <div class="kill-state dead" id="killDead">
      <div class="k-icon">💀</div>
      <div class="k-title">APP KILLED</div>
      <div class="k-sub">process terminated</div>
      <div class="k-badge">280 records LOST</div>
    </div>

    <!-- Kill State GUARDED (Scene 2) -->
    <div class="kill-state guarded" id="killGuarded">
      <div class="g-icon">🛡️</div>
      <div class="g-title">Guard Active</div>
      <div class="g-sub">syncing in background...</div>
    </div>
  </div>

  <!-- TERMINAL -->
  <div class="terminal">
    <div class="t-bar">
      <div class="dot dr"></div>
      <div class="dot dy"></div>
      <div class="dot dg"></div>
      <div class="t-title">flutter — Android (Pixel 7 Pro)</div>
    </div>
    <div class="t-body" id="tb"></div>
  </div>
</div>

<div class="scene-chip" id="chip"></div>

<script>
  const tb       = document.getElementById('tb');
  const notif    = document.getElementById('notif');
  const killDead = document.getElementById('killDead');
  const killGuarded = document.getElementById('killGuarded');
  const appStatus = document.getElementById('appStatus');
  const chip     = document.getElementById('chip');

  function scene(txt) {
    chip.classList.remove('show');
    setTimeout(() => { chip.textContent = txt; chip.classList.add('show'); }, 250);
  }

  let logDelay = 0;
  function log(html, cls, delay) {
    logDelay += delay;
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = `ll ${cls}`;
      d.innerHTML = html;
      tb.appendChild(d);
      requestAnimationFrame(() => d.classList.add('s'));
      tb.scrollTop = tb.scrollHeight;
    }, logDelay);
  }

  function wait(ms) { logDelay += ms; }
  function at(ms, fn) { setTimeout(fn, ms); }

  function resetAll() {
    tb.innerHTML = '';
    logDelay = 0;
    notif.classList.remove('show');
    killDead.classList.remove('show');
    killGuarded.classList.remove('show');
    appStatus.textContent = 'Idle';
  }

  async function runScene1() {
    resetAll();
    scene('🔴 Without lifecycle_guard');

    log('<span class="cc">$</span> flutter run', 'ci', 0);
    log('✓  App installed on Pixel 7', 'cs', 600);
    log('▶  User taps "Start Background Sync"', 'ci', 800);
    appStatus.textContent = 'Syncing…';
    log('⏳ Uploading records…  <span class="cw">0 / 500</span>', 'ci', 700);
    log('⏳ Uploading records…  <span class="cw">80 / 500</span>', 'ci', 800);
    log('⏳ Uploading records…  <span class="cw">180 / 500</span>', 'ci', 800);
    log('⏳ Uploading records…  <span class="cw">280 / 500</span>', 'ci', 800);

    // Kill
    wait(400);
    setTimeout(() => {
      scene('☠️  User swipes app away — NO protection');
      killDead.classList.add('show');
      appStatus.textContent = '';
    }, logDelay);

    log('<span class="ce">✗  UI process killed by OS</span>', 'ce', 400);
    log('<span class="ce">✗  Background thread terminated</span>', 'ce', 500);
    log('<span class="ce">✗  Task DEAD — 280 records LOST 💔</span>', 'ce', 600);

    // Pause, then run scene 2
    wait(2200);
    setTimeout(runScene2, logDelay);
  }

  function runScene2() {
    resetAll();
    scene('🟢 With lifecycle_guard');

    log('<span class="cc">$</span> flutter run', 'ci', 0);
    log('✓  App installed on Pixel 7', 'cs', 600);
    log('<span class="cg">🛡️ LifecycleGuard.runSecureTask(id: "sync_001")</span>', 'cg', 800);
    log('✓  Foreground Service bound  [dataSync]', 'cs', 600);

    setTimeout(() => notif.classList.add('show'), logDelay + 100);
    appStatus.textContent = '🛡️ Guarded';

    log('▶  Sync started', 'ci', 400);
    log('⏳ Uploading records…  <span class="cw">0 / 500</span>', 'ci', 700);
    log('⏳ Uploading records…  <span class="cw">80 / 500</span>', 'ci', 700);
    log('⏳ Uploading records…  <span class="cw">200 / 500</span>', 'ci', 700);
    log('⏳ Uploading records…  <span class="cw">320 / 500</span>', 'ci', 700);

    // User swipes app (UI killed, guard stays)
    wait(400);
    setTimeout(() => {
      scene('⚠️  User swipes app — Guard holds on');
      killGuarded.classList.add('show'); // dim overlay, notif stays visible
    }, logDelay);

    log('<span class="cw">⚠  UI process closed by user</span>', 'cw', 400);
    log('<span class="cg">🛡️  LifecycleService: still running</span>', 'cg', 500);
    log('⏳ Uploading records…  <span class="cw">400 / 500</span>', 'ci', 700);
    log('⏳ Uploading records…  <span class="cw">460 / 500</span>', 'ci', 700);
    log('⏳ Uploading records…  <span class="cw">500 / 500</span>', 'ci', 700);

    wait(300);
    setTimeout(() => {
      killGuarded.classList.remove('show');
      notif.classList.remove('show');
    }, logDelay);

    log('<span class="cs">✅ Sync COMPLETE — 500 / 500 records saved!</span>', 'cs', 200);
    wait(300);
    setTimeout(() => appStatus.textContent = '✅ 500 saved', logDelay);

    scene('✅ lifecycle_guard — Your data survives. Always.');

    wait(3000);
    setTimeout(runScene1, logDelay);
  }

  setTimeout(runScene1, 800);
</script>
</body>
</html>
