<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="guard_icon.png">
    <title>Android Demo | lifecycle_guard</title>
    <style>
        :root {
            --bg: #090c12;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --secondary: #3fb950;
            --error: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
            overflow-x: hidden;
        }

        /* Top Header */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .header-logo img { width: 32px; height: 32px; }
        .header-logo h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        .header-logo h1 span { color: var(--text-muted); font-weight: 400; }
        .tagline { color: var(--text-muted); font-size: 14px; }

        /* Layout Container */
        .demo-container {
            display: flex;
            gap: 40px;
            align-items: center;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
        }

        /* Phone Styling */
        .phone-frame {
            width: 300px;
            height: 600px;
            background: #000;
            border: 12px solid #1a1c1e;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
        }

        .phone-screen {
            height: 100%;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-icon-large {
            width: 64px;
            height: 64px;
            background: #1a73e8;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 60px 0 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .app-name { font-weight: 700; font-size: 18px; margin-bottom: 40px; }

        .btn-sync {
            width: 100%;
            background: #1f6feb;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-sync:active { transform: scale(0.96); }
        .btn-sync:disabled { opacity: 0.6; cursor: not-allowed; }

        .syncing-text {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-muted);
            display: none;
        }

        /* Terminal Styling */
        .terminal-window {
            flex: 1;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 500px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 600px;
        }

        .terminal-header {
            background: #161b22;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }

        .traffic-lights { display: flex; gap: 8px; margin-right: 20px; }
        .light { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .terminal-title { color: var(--text-muted); font-size: 12px; flex: 1; text-align: center; margin-right: 40px; }

        .terminal-body {
            padding: 24px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
            overflow-y: auto;
        }

        .log-line { margin-bottom: 8px; opacity: 0; transform: translateX(-10px); transition: all 0.3s; }
        .log-line.show { opacity: 1; transform: translateX(0); }
        .prompt { color: var(--primary); margin-right: 8px; }
        .success { color: var(--secondary); }
        .warning { color: var(--yellow); }
        .error-msg { color: var(--error); }

        /* Bottom Badge */
        .status-badge {
            margin-top: 60px;
            background: #161b22;
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-red { background: var(--error); box-shadow: 0 0 10px var(--error); }

        @media (max-width: 850px) {
            .demo-container { flex-direction: column; align-items: center; }
            .terminal-window { width: 100%; height: 350px; }
            body { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="header-logo">
            <img src="guard_icon.png" alt="Guard">
            <h1>lifecycle_guard <span>by Crealify</span></h1>
        </div>
        <p class="tagline">Background tasks survive. Always.</p>
    </div>

    <div class="demo-container">
        <!-- Phone UI -->
        <div class="phone-frame">
            <div class="phone-screen">
                <div style="font-size: 10px; color: #555; width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span>9:41</span>
                    <span>Pixel 7 Pro</span>
                </div>
                
                <div class="app-icon-large">
                    <img src="guard_icon.png" width="32" alt="App">
                </div>
                <div class="app-name">MyApp</div>

                <button id="btn-sync" class="btn-sync" onclick="startDemo()">Start Background Sync</button>
                <div id="sync-status" class="syncing-text">Syncing...</div>
            </div>
        </div>

        <!-- Terminal UI -->
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="traffic-lights">
                    <div class="light red"></div>
                    <div class="light yellow"></div>
                    <div class="light green"></div>
                </div>
                <div class="terminal-title">flutter -- Android (Pixel 7 Pro)</div>
            </div>
            <div id="terminal" class="terminal-body">
                <div class="log-line show"><span class="prompt">$</span> flutter run</div>
                <div class="log-line show success">[OK] App installed on Pixel 7 Pro</div>
                <div class="log-line show">[INFO] User ready to test...</div>
            </div>
        </div>
    </div>

    <div class="status-badge">
        <div class="dot dot-red"></div>
        Without lifecycle_guard
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const btn = document.getElementById('btn-sync');
        const syncStatus = document.getElementById('sync-status');

        function addLog(text, type = '') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.innerHTML = text;
            terminal.appendChild(line);
            setTimeout(() => line.classList.add('show'), 50);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function startDemo() {
            btn.disabled = true;
            syncStatus.style.display = 'block';
            
            addLog('[USER] Taps "Start Background Sync"');
            
            setTimeout(() => {
                addLog('<span class="prompt">I/flutter:</span> Starting mission-critical sync...');
                addLog('<span class="prompt">I/Native:</span> Initializing Lifecycle Guard Service...');
            }, 800);

            setTimeout(() => {
                addLog('<span class="prompt">I/Native:</span> Foreground Service promoted (dataSync)');
                addLog('<span class="prompt">I/flutter:</span> Progress: 12% ... 25% ...');
            }, 2000);

            // Simulation: Termination
            setTimeout(() => {
                addLog('<span class="error-msg">[KILL] Process terminated by system (User Swipe)</span>');
                document.body.style.opacity = '0.9';
            }, 4500);

            setTimeout(() => {
                addLog('<span class="success">[GUARD] Termination detected. Keeping process alive.</span>');
                addLog('<span class="prompt">I/flutter:</span> Progress: 26% ... 27% ... (Resumed)');
                addLog('<span class="success">[OK] Background sync PROTECTED.</span>');
            }, 6000);
        }
    </script>
</body>
</html>
