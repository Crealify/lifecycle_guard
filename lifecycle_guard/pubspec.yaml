name: lifecycle_guard
description: "A bulletproof Flutter plugin for mission-critical background execution."
version: 1.0.0
repository: https://github.com/Crealify/lifecycle_guard.git
homepage: https://anil-bhattarai.com.np

environment:
  sdk: ^3.11.4
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  lifecycle_guard_platform_interface: ^1.0.0
  lifecycle_guard_android: ^1.0.0
  lifecycle_guard_ios: ^1.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: lifecycle_guard_android
      ios:
        default_package: lifecycle_guard_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
