name: lifecycle_guard
description: "Flutter apps often lose critical work when users swipe them away or the OS kills the process. lifecycle_guard ensures your background tasks continue and complete — even after termination."
version: 1.0.2
repository: https://github.com/Crealify/lifecycle_guard.git
homepage: https://anil-bhattarai.com.np

topics:
  - background-task
  - background-execution
  - foreground-service
  - data-sync
  - flutter

screenshots:
  - description: 'Lifecycle Guard Active Status'
    path: doc/guard_icon.png

environment:
  sdk: ^3.11.4
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  lifecycle_guard_platform_interface: ^1.0.2
  lifecycle_guard_android: ^1.0.2
  lifecycle_guard_ios: ^1.0.2

# These overrides ensure the IDE uses local source during development
# They are ignored by pub.dev for consumers
dependency_overrides:
  lifecycle_guard_platform_interface:
    path: ../lifecycle_guard_platform_interface
  lifecycle_guard_android:
    path: ../lifecycle_guard_android
  lifecycle_guard_ios:
    path: ../lifecycle_guard_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: lifecycle_guard_android
      ios:
        default_package: lifecycle_guard_ios
