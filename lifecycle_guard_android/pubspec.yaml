name: lifecycle_guard_android
description: "Android implementation of lifecycle_guard for mission-critical background execution."
version: 1.0.1
repository: https://github.com/Crealify/lifecycle_guard.git
homepage: https://anil-bhattarai.com.np

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  lifecycle_guard_platform_interface: ^1.0.1

dependency_overrides:
  lifecycle_guard_platform_interface:
    path: ../lifecycle_guard_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: lifecycle_guard
    platforms:
      android:
        package: com.crealify.lifecycle_guard_android
        pluginClass: LifecycleGuardPlugin
